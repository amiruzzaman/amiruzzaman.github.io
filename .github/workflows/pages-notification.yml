name: Send Gmail Notification on Pages Build/Deploy

on:
  # This workflow runs after the built-in "pages build and deployment" workflow
  workflow_run:
    workflows: ["pages build and deployment"]
    types:
      - completed

jobs:
  send-email:
    runs-on: ubuntu-latest
    # This 'if' statement ensures the email is only sent when the Pages deployment finishes,
    # regardless of success or failure.
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    steps:
      - name: Send Gmail Email
        uses: dawidd6/action-send-mail@v3
        with:
          # Gmail SMTP server settings
          server_address: smtp.gmail.com
          server_port: 465
          # Email credentials (Stored as GitHub Secrets)
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          # Email content
          subject: GitHub Pages Deployment for ${{ github.repository }} - ${{ github.event.workflow_run.conclusion }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          # HTML body for a nicer-looking email
          body: |
            <!DOCTYPE html>
            <html>
            <body>
              <h2>GitHub Pages Deployment Update</h2>
              <p><strong>Repository:</strong> <a href="https://github.com/${{ github.repository }}">${{ github.repository }}</a></p>
              <p><strong>Status:</strong> ${{ github.event.workflow_run.conclusion }}</p>
              <p><strong>Triggered by:</strong> ${{ github.actor }}</p>
              <p><strong>Commit:</strong> ${{ github.event.workflow_run.head_sha }}</p>
              <p><strong>View the run:</strong> <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}">Click here for details</a></p>
              <hr>
              <p>This is an automated notification from GitHub Actions.</p>
            </body>
            </html>