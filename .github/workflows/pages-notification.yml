# Update your workflow to use this more reliable approach
name: Send Gmail Notification on Pages Build/Deploy

on:
  # Alternative: Run on workflow_run for ANY workflow named with 'pages'
  workflow_run:
    workflows: ["*"]  # Temporarily use wildcard to debug
    types:
      - completed

jobs:
  send-email:
    runs-on: ubuntu-latest
    # Only run if the completed workflow is a Pages deployment
    if: ${{ contains(github.event.workflow_run.name, 'pages') || contains(github.event.workflow_run.name, 'Pages') }}
    steps:
      - name: Send Gmail Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: GitHub Pages Deployment for ${{ github.repository }} - ${{ github.event.workflow_run.conclusion }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            Repository: ${{ github.repository }}
            Status: ${{ github.event.workflow_run.conclusion }}
            Workflow: ${{ github.event.workflow_run.name }}
            Commit: ${{ github.event.workflow_run.head_sha }}
            View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
