<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Coin Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1015;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* Top bar */
        .top-bar {
            background: #121c28;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a3e54;
            flex-shrink: 0;
        }

        .country-selector {
            background: #1f3142;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #4f6c8a;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .mode-buttons {
            display: flex;
            background: #1f3142;
            border-radius: 40px;
            padding: 2px;
        }

        .mode-btn {
            padding: 6px 16px;
            border-radius: 40px;
            border: none;
            background: transparent;
            color: #bed3ec;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .mode-btn.active {
            background: #31658c;
            color: white;
        }

        .stats {
            background: #0e1d2c;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            margin-left: auto;
        }

        /* Main image area */
        .image-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #15222e, #040a12);
            position: relative;
            min-height: 0;
        }

        .image-wrapper {
            max-width: 90%;
            max-height: 90%;
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 16px;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            border-radius: 12px;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 48px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            padding: 20px;
            z-index: 10;
        }

        .nav-left { left: 0; }
        .nav-right { right: 0; }

        /* Info panel */
        .info-panel {
            background: rgba(16, 28, 42, 0.95);
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            border-top: 1px solid #2a3e54;
            font-size: 12px;
            flex-shrink: 0;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #8aa9c9;
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
            color: #f7e9d4;
        }

        .country-name {
            color: #ffd966;
            font-weight: bold;
        }

        .counter {
            margin-left: auto;
            background: #1f3142;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 13px;
        }

        /* Thumbnails */
        .thumbnails {
            background: rgba(15, 27, 40, 0.9);
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-top: 1px solid #2a3e54;
            flex-shrink: 0;
        }

        .thumb {
            width: 65px;
            height: 55px;
            background: #1f3343;
            border-radius: 10px;
            border: 2px solid transparent;
            overflow: hidden;
            cursor: pointer;
            flex-shrink: 0;
        }

        .thumb.active {
            border-color: #ffd966;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: #0f1f2e;
            border-radius: 24px;
            width: 90%;
            max-width: 350px;
            max-height: 80vh;
            border: 2px solid #ffd966;
            overflow: hidden;
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid #2a3e54;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #ffd966;
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 16px;
        }

        .modal-search {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            border: none;
            background: #10212e;
            color: white;
            margin-bottom: 12px;
        }

        .modal-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .modal-item {
            padding: 12px;
            background: #112433;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            text-align: center;
        }

        .modal-item.selected {
            background: #31658c;
            border: 1px solid #ffd966;
        }

        .modal-buttons {
            padding: 12px 16px;
            border-top: 1px solid #2a3e54;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }

        .btn-cancel { background: #2a3e54; color: white; }
        .btn-confirm { background: #ffd966; color: #1f3142; font-weight: bold; }

        @media (max-width: 600px) {
            .stats { display: none; }
            .country-selector { font-size: 12px; padding: 6px 12px; max-width: 140px; }
            .mode-btn { padding: 4px 10px; font-size: 11px; }
            .thumb { width: 50px; height: 45px; }
            .info-value { font-size: 11px; }
            .counter { font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="countryBtn" class="country-selector">Loading...</div>
    <div class="mode-buttons">
        <button id="modeCountry" class="mode-btn active">Country</button>
        <button id="modeAll" class="mode-btn">All Coins</button>
    </div>
    <div class="stats"><span id="totalCountries">0</span> · <span id="totalItems">0</span></div>
</div>

<div class="image-area">
    <div class="nav-arrow nav-left" id="prevBtn">‹</div>
    <div id="imageWrapper" class="image-wrapper"></div>
    <div class="nav-arrow nav-right" id="nextBtn">›</div>
</div>

<div class="info-panel">
    <div class="info-item"><span class="info-label">Country</span><span id="countryDisplay" class="info-value country-name">—</span></div>
    <div class="info-item"><span class="info-label">Donor</span><span id="donorDisplay" class="info-value">—</span></div>
    <div class="info-item"><span class="info-label">Year</span><span id="yearDisplay" class="info-value">—</span></div>
    <div class="info-item"><span class="info-label">Size</span><span id="sizeDisplay" class="info-value">—</span></div>
    <div class="info-item" style="flex:2;"><span class="info-label">Note</span><span id="noteDisplay" class="info-value">—</span></div>
    <div id="counter" class="counter">0/0</div>
</div>

<div id="thumbnails" class="thumbnails"></div>

<div id="countryModal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Select Country</h3>
            <button id="closeModal" class="modal-close">✕</button>
        </div>
        <div class="modal-body">
            <input type="text" id="searchCountry" class="modal-search" placeholder="Search...">
            <div id="countryList" class="modal-list"></div>
        </div>
        <div class="modal-buttons">
            <button id="cancelModal" class="btn-cancel">Cancel</button>
            <button id="confirmModal" class="btn-confirm">Select</button>
        </div>
    </div>
</div>

<script>
    // Data
    let allCoins = [];
    let countries = [];
    let currentCountry = '';
    let countryCoins = [];
    let currentIndex = 0;
    let isCountryMode = true;
    let currentList = [];

    // DOM elements
    const countryBtn = document.getElementById('countryBtn');
    const modal = document.getElementById('countryModal');
    const searchInput = document.getElementById('searchCountry');
    const countryListDiv = document.getElementById('countryList');
    const closeModal = document.getElementById('closeModal');
    const cancelModal = document.getElementById('cancelModal');
    const confirmModal = document.getElementById('confirmModal');
    const modeCountry = document.getElementById('modeCountry');
    const modeAll = document.getElementById('modeAll');
    const countryDisplay = document.getElementById('countryDisplay');
    const donorDisplay = document.getElementById('donorDisplay');
    const yearDisplay = document.getElementById('yearDisplay');
    const sizeDisplay = document.getElementById('sizeDisplay');
    const noteDisplay = document.getElementById('noteDisplay');
    const counter = document.getElementById('counter');
    const imageWrapper = document.getElementById('imageWrapper');
    const thumbnailsDiv = document.getElementById('thumbnails');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const totalCountriesSpan = document.getElementById('totalCountries');
    const totalItemsSpan = document.getElementById('totalItems');

    let tempSelectedCountry = '';

    function toTitleCase(str) {
        return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    }

    function showModal() {
        tempSelectedCountry = currentCountry;
        renderCountryList('');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        searchInput.focus();
    }

    function hideModal() {
        modal.style.display = 'none';
        document.body.style.overflow = '';
    }

    function renderCountryList(filter) {
        const term = filter.toLowerCase();
        const filtered = countries.filter(c => c.toLowerCase().includes(term));
        countryListDiv.innerHTML = '';
        filtered.forEach(country => {
            const div = document.createElement('div');
            div.className = 'modal-item';
            if (country === tempSelectedCountry) div.classList.add('selected');
            div.textContent = country;
            div.onclick = () => {
                document.querySelectorAll('.modal-item').forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                tempSelectedCountry = country;
            };
            countryListDiv.appendChild(div);
        });
    }

    function confirmCountry() {
        if (tempSelectedCountry && tempSelectedCountry !== currentCountry) {
            currentCountry = tempSelectedCountry;
            countryCoins = allCoins.filter(c => c.country === currentCountry);
            countryBtn.textContent = currentCountry;
            if (isCountryMode) {
                currentList = [...countryCoins];
                currentIndex = 0;
                renderCurrent();
                renderThumbnails();
            }
        }
        hideModal();
    }

    async function loadData() {
        try {
            const res = await fetch('images/coins.json');
            const data = await res.json();
            allCoins = data.filter(c => c.country && c.image);
            allCoins = allCoins.map(c => ({ ...c, country: toTitleCase(c.country) }));
            
            const unique = new Set();
            allCoins.forEach(c => unique.add(c.country));
            countries = Array.from(unique).sort();
            
            totalCountriesSpan.textContent = countries.length;
            totalItemsSpan.textContent = allCoins.length;
            
            if (countries.length) {
                currentCountry = countries[0];
                countryCoins = allCoins.filter(c => c.country === currentCountry);
                countryBtn.textContent = currentCountry;
                currentList = [...countryCoins];
                currentIndex = 0;
                renderCurrent();
                renderThumbnails();
            }
        } catch(e) {
            console.error(e);
            countryBtn.textContent = 'Error loading';
        }
    }

    function renderCurrent() {
        if (!currentList.length || currentIndex < 0) {
            imageWrapper.innerHTML = '<div style="padding:20px;">No coins</div>';
            return;
        }
        
        const coin = currentList[currentIndex];
        countryDisplay.textContent = coin.country;
        donorDisplay.textContent = coin.donor_name || '—';
        yearDisplay.textContent = (coin.year && coin.year !== '0000') ? coin.year : '—';
        sizeDisplay.textContent = (coin.size && coin.size !== '00') ? coin.size : '—';
        let note = coin.note || '—';
        if (note.length > 70) note = note.slice(0, 67) + '…';
        noteDisplay.textContent = note;
        counter.textContent = `${currentIndex+1}/${currentList.length}`;
        
        const imgPath = `images/${encodeURIComponent(coin.country)}/${encodeURIComponent(coin.image)}`;
        const img = new Image();
        img.onload = () => {
            imageWrapper.innerHTML = '';
            imageWrapper.appendChild(img);
        };
        img.onerror = () => {
            imageWrapper.innerHTML = '<div style="padding:20px;">Image missing</div>';
        };
        img.src = imgPath;
        img.style.maxWidth = '100%';
        img.style.maxHeight = '100%';
        img.style.borderRadius = '12px';
        
        document.querySelectorAll('.thumb').forEach((t, i) => {
            t.classList.toggle('active', i === currentIndex);
        });
    }

    function renderThumbnails() {
        thumbnailsDiv.innerHTML = '';
        if (!currentList.length) return;
        
        currentList.forEach((coin, idx) => {
            const thumb = document.createElement('div');
            thumb.className = 'thumb';
            if (idx === currentIndex) thumb.classList.add('active');
            const img = document.createElement('img');
            img.src = `images/${encodeURIComponent(coin.country)}/${encodeURIComponent(coin.image)}`;
            img.onerror = () => { thumb.innerHTML = '📀'; };
            thumb.appendChild(img);
            thumb.onclick = () => {
                currentIndex = idx;
                renderCurrent();
            };
            thumbnailsDiv.appendChild(thumb);
        });
    }

    function next() {
        if (!currentList.length) return;
        currentIndex = (currentIndex + 1) % currentList.length;
        renderCurrent();
    }

    function prev() {
        if (!currentList.length) return;
        currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
        renderCurrent();
    }

    function setMode(countryMode) {
        isCountryMode = countryMode;
        if (countryMode) {
            modeCountry.classList.add('active');
            modeAll.classList.remove('active');
            currentList = [...countryCoins];
        } else {
            modeAll.classList.add('active');
            modeCountry.classList.remove('active');
            currentList = [...allCoins];
        }
        currentIndex = 0;
        renderCurrent();
        renderThumbnails();
    }

    // Event listeners
    countryBtn.onclick = showModal;
    closeModal.onclick = hideModal;
    cancelModal.onclick = hideModal;
    confirmModal.onclick = confirmCountry;
    searchInput.oninput = (e) => renderCountryList(e.target.value);
    modal.onclick = (e) => { if (e.target === modal) hideModal(); };
    modeCountry.onclick = () => { if (!isCountryMode) setMode(true); };
    modeAll.onclick = () => { if (isCountryMode) setMode(false); };
    prevBtn.onclick = prev;
    nextBtn.onclick = next;
    
    document.onkeydown = (e) => {
        if (modal.style.display === 'flex') {
            if (e.key === 'Escape') hideModal();
            if (e.key === 'Enter' && document.activeElement !== searchInput) confirmCountry();
        } else {
            if (e.key === 'ArrowLeft') prev();
            if (e.key === 'ArrowRight') next();
        }
    };
    
    let touchStart = 0;
    const imageArea = document.querySelector('.image-area');
    imageArea.ontouchstart = (e) => { touchStart = e.touches[0].clientX; };
    imageArea.ontouchend = (e) => {
        if (!touchStart) return;
        const diff = e.changedTouches[0].clientX - touchStart;
        if (Math.abs(diff) > 40) diff > 0 ? prev() : next();
        touchStart = 0;
    };

    loadData();
</script>
</body>
</html>
