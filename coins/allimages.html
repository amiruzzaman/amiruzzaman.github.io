<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>coin gallery · fully working mobile</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0b1015;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #eef3fa;
            overflow: hidden;
        }

        /* Top bar */
        .top-bar {
            background: rgba(18, 28, 40, 0.95);
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border-bottom: 1px solid #3f556e;
            z-index: 20;
            flex-shrink: 0;
        }

        .country-btn {
            background: #1f3142;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #6d8db2;
            color: #f3e7d3;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 45%;
            flex-shrink: 1;
        }
        
        .country-btn:active {
            transform: scale(0.97);
        }

        .mode-buttons {
            background: #1f3142;
            border-radius: 40px;
            display: flex;
            padding: 2px;
            flex-shrink: 0;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #bed3ec;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .mode-btn.active {
            background: #31658c;
            color: white;
        }

        .stats {
            background: #0e1d2c;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .stats { display: none; }
            .country-btn { font-size: 12px; padding: 6px 12px; }
            .mode-btn { padding: 5px 10px; font-size: 11px; }
        }

        /* MODAL - STAYS SEPARATE FROM MAIN CONTENT */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #0f1f2e;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            border: 2px solid #ffd966;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid #3b577b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a2c3e;
        }

        .modal-header h3 {
            color: #ffd966;
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        
        .modal-close:active {
            background: rgba(255,255,255,0.1);
        }

        .modal-body {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-search {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 30px;
            border: none;
            background: #10212e;
            color: white;
            margin-bottom: 12px;
            outline: 1px solid #3b5777;
        }
        
        .modal-search:focus {
            outline: 2px solid #ffd966;
        }

        .country-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .country-option {
            padding: 14px;
            background: #112433;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 16px;
            transition: 0.1s;
        }
        
        .country-option:active {
            transform: scale(0.98);
            background: #31658c;
        }

        .country-option.selected {
            background: #31658c;
            border: 1px solid #ffd966;
        }

        .modal-buttons {
            padding: 12px 16px;
            border-top: 1px solid #3b577b;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        
        .modal-buttons button:active {
            transform: scale(0.97);
        }

        .btn-cancel { background: #2a3e54; color: white; }
        .btn-confirm { background: #ffd966; color: #1f3142; font-weight: bold; }

        /* Slider */
        .slider {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 40%, #15222e, #040a12);
            position: relative;
            min-height: 0;
        }

        .image-container {
            max-width: 95%;
            max-height: 95%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 18, 28, 0.7);
            border-radius: 24px;
            padding: 16px;
        }

        .image-container img {
            max-width: 100%;
            max-height: calc(100vh - 280px);
            object-fit: contain;
            border-radius: 16px;
        }

        .nav-arrow {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: rgba(240, 230, 200, 0.5);
            cursor: pointer;
            z-index: 10;
        }
        
        .nav-arrow:active {
            color: white;
        }

        .nav-left { left: 0; }
        .nav-right { right: 0; }

        /* Info panel */
        .info-panel {
            background: rgba(16, 28, 42, 0.85);
            backdrop-filter: blur(8px);
            border-top: 1px solid #47648b;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #acc4e3;
        }

        .info-value {
            color: #f7e9d4;
            font-size: 13px;
        }

        .country-highlight {
            color: #ffd966;
            font-weight: bold;
        }

        .counter {
            margin-left: auto;
            background: #1b3145;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            white-space: nowrap;
        }

        /* Thumbnails */
        .thumbnails {
            background: rgba(15, 27, 40, 0.88);
            border-top: 1px solid #3b577b;
            padding: 8px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .thumb {
            flex: 0 0 auto;
            width: 60px;
            height: 50px;
            background: #1f3343;
            border-radius: 10px;
            border: 2px solid transparent;
            overflow: hidden;
            cursor: pointer;
        }
        
        .thumb:active {
            transform: scale(0.95);
        }

        .thumb.active {
            border-color: #ffd966;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        @media (max-width: 680px) {
            .thumb { width: 55px; height: 48px; }
            .image-container img { max-height: calc(100vh - 300px); }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="countryButton" class="country-btn">loading...</div>
    <div class="mode-buttons">
        <button id="modeCountryBtn" class="mode-btn active">Country</button>
        <button id="modeAllBtn" class="mode-btn">All</button>
    </div>
    <div class="stats"><span id="statCountries">0</span> · <span id="statItems">0</span></div>
</div>

<!-- MODAL - SEPARATE FROM MAIN CONTENT, WILL NOT DISAPPEAR -->
<div id="countryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>🌍 Select Country</h3>
            <button id="modalCloseBtn" class="modal-close">✕</button>
        </div>
        <div class="modal-body">
            <input type="text" id="searchInput" class="modal-search" placeholder="🔍 Search country..." autocomplete="off">
            <div id="countryList" class="country-list"></div>
        </div>
        <div class="modal-buttons">
            <button id="modalCancelBtn" class="btn-cancel">Cancel</button>
            <button id="modalConfirmBtn" class="btn-confirm">Select</button>
        </div>
    </div>
</div>

<div class="slider">
    <div id="prevArrow" class="nav-arrow nav-left">‹</div>
    <div id="imageContainer" class="image-container"></div>
    <div id="nextArrow" class="nav-arrow nav-right">›</div>
</div>

<div class="info-panel">
    <div class="info-item">
        <span class="info-label">Country</span>
        <span id="displayCountry" class="info-value country-highlight">—</span>
    </div>
    <div class="info-item">
        <span class="info-label">Donor</span>
        <span id="displayDonor" class="info-value">—</span>
    </div>
    <div class="info-item">
        <span class="info-label">Year</span>
        <span id="displayYear" class="info-value">—</span>
    </div>
    <div class="info-item">
        <span class="info-label">Size</span>
        <span id="displaySize" class="info-value">—</span>
    </div>
    <div class="info-item" style="flex:2;">
        <span class="info-label">Note</span>
        <span id="displayNote" class="info-value">—</span>
    </div>
    <div id="counter" class="counter">0/0</div>
</div>

<div id="thumbnails" class="thumbnails"></div>

<script>
    (function() {
        // Data
        let allCoins = [];
        let countries = [];
        let currentCountry = null;
        let countryItems = [];
        let currentIndex = 0;
        let currentMode = 'country'; // 'country' or 'all'
        let currentList = [];
        
        // DOM elements
        const countryBtn = document.getElementById('countryButton');
        const modal = document.getElementById('countryModal');
        const searchInput = document.getElementById('searchInput');
        const countryListDiv = document.getElementById('countryList');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');
        const modeCountryBtn = document.getElementById('modeCountryBtn');
        const modeAllBtn = document.getElementById('modeAllBtn');
        const statCountries = document.getElementById('statCountries');
        const statItems = document.getElementById('statItems');
        const displayCountry = document.getElementById('displayCountry');
        const displayDonor = document.getElementById('displayDonor');
        const displayYear = document.getElementById('displayYear');
        const displaySize = document.getElementById('displaySize');
        const displayNote = document.getElementById('displayNote');
        const counter = document.getElementById('counter');
        const imageContainer = document.getElementById('imageContainer');
        const thumbnailsDiv = document.getElementById('thumbnails');
        const prevArrow = document.getElementById('prevArrow');
        const nextArrow = document.getElementById('nextArrow');
        
        let selectedCountryTemp = null;
        
        function toTitleCase(str) {
            if (!str) return '';
            return str.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
        }
        
        // Show modal
        function showModal() {
            selectedCountryTemp = currentCountry;
            renderCountryList('');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            setTimeout(() => {
                if (searchInput) searchInput.focus();
            }, 100);
        }
        
        // Hide modal
        function hideModal() {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
        
        // Render country list
        function renderCountryList(filter) {
            const term = filter.toLowerCase();
            const filtered = countries.filter(c => c.toLowerCase().includes(term));
            
            countryListDiv.innerHTML = '';
            filtered.forEach(country => {
                const div = document.createElement('div');
                div.className = 'country-option';
                if (country === selectedCountryTemp) div.classList.add('selected');
                div.textContent = country;
                div.onclick = (function(c) {
                    return function() {
                        document.querySelectorAll('.country-option').forEach(opt => opt.classList.remove('selected'));
                        this.classList.add('selected');
                        selectedCountryTemp = c;
                    };
                })(country);
                countryListDiv.appendChild(div);
            });
            
            if (filtered.length === 0) {
                countryListDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">No countries found</div>';
            }
        }
        
        // Confirm selection
        function confirmSelection() {
            if (selectedCountryTemp && selectedCountryTemp !== currentCountry) {
                currentCountry = selectedCountryTemp;
                countryItems = allCoins.filter(c => c.country === currentCountry);
                countryBtn.textContent = currentCountry;
                
                if (currentMode === 'country') {
                    currentList = [...countryItems];
                    currentIndex = currentList.length > 0 ? 0 : -1;
                    renderCurrentCoin();
                    renderThumbnails();
                }
            }
            hideModal();
        }
        
        // Load JSON
        async function loadData() {
            try {
                const response = await fetch('images/coins.json');
                if (!response.ok) throw new Error('Failed to load');
                allCoins = await response.json();
                
                allCoins = allCoins.filter(c => c.country && c.country.trim() !== '' && c.image);
                allCoins = allCoins.map(c => ({ ...c, country: toTitleCase(c.country.trim()) }));
                
                const countrySet = new Set();
                allCoins.forEach(c => countrySet.add(c.country));
                countries = Array.from(countrySet).sort();
                
                statCountries.textContent = countries.length;
                statItems.textContent = allCoins.length;
                
                if (countries.length > 0) {
                    currentCountry = countries[0];
                    countryItems = allCoins.filter(c => c.country === currentCountry);
                    countryBtn.textContent = currentCountry;
                    currentList = [...countryItems];
                    currentIndex = currentList.length > 0 ? 0 : -1;
                    renderCurrentCoin();
                    renderThumbnails();
                }
            } catch (e) {
                console.error(e);
                countryBtn.textContent = 'Error';
                imageContainer.innerHTML = '<div style="padding:20px;">Failed to load data</div>';
            }
        }
        
        // Render current coin
        function renderCurrentCoin() {
            if (!currentList.length || currentIndex < 0 || currentIndex >= currentList.length) {
                imageContainer.innerHTML = '<div style="padding:20px; text-align:center;">No coins</div>';
                displayCountry.textContent = '—';
                displayDonor.textContent = '—';
                displayYear.textContent = '—';
                displaySize.textContent = '—';
                displayNote.textContent = '—';
                counter.textContent = '0/0';
                return;
            }
            
            const coin = currentList[currentIndex];
            // Always show the country name - this is the key fix for "all coins" mode
            displayCountry.textContent = coin.country;
            displayDonor.textContent = coin.donor_name || '—';
            displayYear.textContent = (coin.year && coin.year !== '0000') ? coin.year : '—';
            displaySize.textContent = (coin.size && coin.size !== '00') ? coin.size : '—';
            let note = coin.note || '—';
            if (note.length > 80) note = note.substring(0, 77) + '…';
            displayNote.textContent = note;
            counter.textContent = `${currentIndex + 1}/${currentList.length}`;
            
            const imgPath = `images/${encodeURIComponent(coin.country)}/${encodeURIComponent(coin.image)}`;
            const img = new Image();
            img.onload = () => {
                imageContainer.innerHTML = '';
                img.style.maxWidth = '100%';
                img.style.maxHeight = '100%';
                img.style.borderRadius = '16px';
                imageContainer.appendChild(img);
            };
            img.onerror = () => {
                imageContainer.innerHTML = '<div style="padding:20px; text-align:center;">📷 Image missing</div>';
            };
            img.src = imgPath;
            
            // Update thumbnail highlight
            document.querySelectorAll('.thumb').forEach((thumb, idx) => {
                thumb.classList.toggle('active', idx === currentIndex);
            });
            
            // Scroll active thumbnail into view
            const activeThumb = document.querySelector('.thumb.active');
            if (activeThumb) {
                activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }
        
        // Render thumbnails
        function renderThumbnails() {
            thumbnailsDiv.innerHTML = '';
            if (!currentList.length) {
                thumbnailsDiv.innerHTML = '<div style="padding:10px; text-align:center;">No items</div>';
                return;
            }
            
            currentList.forEach((coin, idx) => {
                const thumb = document.createElement('div');
                thumb.className = 'thumb';
                if (idx === currentIndex) thumb.classList.add('active');
                
                const img = document.createElement('img');
                img.src = `images/${encodeURIComponent(coin.country)}/${encodeURIComponent(coin.image)}`;
                img.alt = coin.country;
                img.onerror = () => {
                    thumb.innerHTML = '<span style="display:flex;align-items:center;justify-content:center;height:100%;">📀</span>';
                };
                thumb.appendChild(img);
                thumb.onclick = (function(i) {
                    return function() {
                        currentIndex = i;
                        renderCurrentCoin();
                    };
                })(idx);
                thumbnailsDiv.appendChild(thumb);
            });
        }
        
        // Navigation
        function nextCoin() {
            if (!currentList.length) return;
            currentIndex = (currentIndex + 1) % currentList.length;
            renderCurrentCoin();
        }
        
        function prevCoin() {
            if (!currentList.length) return;
            currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
            renderCurrentCoin();
        }
        
        // Switch mode
        function setMode(mode) {
            currentMode = mode;
            if (mode === 'country') {
                modeCountryBtn.classList.add('active');
                modeAllBtn.classList.remove('active');
                currentList = [...countryItems];
                currentIndex = currentList.length > 0 ? 0 : -1;
            } else {
                modeAllBtn.classList.add('active');
                modeCountryBtn.classList.remove('active');
                currentList = [...allCoins];
                currentIndex = currentList.length > 0 ? 0 : -1;
            }
            renderCurrentCoin();
            renderThumbnails();
        }
        
        // Event listeners - using direct assignment
        countryBtn.onclick = function(e) {
            e.stopPropagation();
            showModal();
        };
        
        modalCloseBtn.onclick = function() { hideModal(); };
        modalCancelBtn.onclick = function() { hideModal(); };
        modalConfirmBtn.onclick = function() { confirmSelection(); };
        
        searchInput.oninput = function(e) {
            renderCountryList(e.target.value);
        };
        
        // Close modal when clicking outside
        modal.onclick = function(e) {
            if (e.target === modal) hideModal();
        };
        
        modeCountryBtn.onclick = function() {
            if (currentMode !== 'country') setMode('country');
        };
        
        modeAllBtn.onclick = function() {
            if (currentMode !== 'all') setMode('all');
        };
        
        prevArrow.onclick = prevCoin;
        nextArrow.onclick = nextCoin;
        
        // Keyboard navigation
        document.onkeydown = function(e) {
            if (modal.style.display === 'flex') {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    hideModal();
                } else if (e.key === 'Enter' && document.activeElement !== searchInput) {
                    e.preventDefault();
                    confirmSelection();
                }
            } else {
                if (e.key === 'ArrowLeft') { e.preventDefault(); prevCoin(); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); nextCoin(); }
            }
        };
        
        // Touch swipe
        let touchStart = 0;
        const slider = document.querySelector('.slider');
        slider.ontouchstart = function(e) {
            touchStart = e.touches[0].clientX;
        };
        slider.ontouchend = function(e) {
            if (!touchStart) return;
            const touchEnd = e.changedTouches[0].clientX;
            const diff = touchEnd - touchStart;
            if (Math.abs(diff) > 50) {
                if (diff > 0) prevCoin();
                else nextCoin();
            }
            touchStart = 0;
        };
        
        // Start
        loadData();
    })();
</script>
</body>
</html>
