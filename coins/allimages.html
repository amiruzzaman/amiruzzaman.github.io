<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>coin gallery · refined fullpage slider + thumbnails</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0b1015;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #eef3fa;
            overflow: hidden;
            font-weight: 400;
        }

        /* smoother gradients, modern glass touch */
        .country-bar {
            background: rgba(18, 28, 40, 0.95);
            backdrop-filter: blur(6px);
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            flex-wrap: wrap;
            border-bottom: 1px solid #3f556e;
            box-shadow: 0 4px 18px rgba(0,0,0,0.7);
            z-index: 20;
            position: relative;
        }

        .country-label {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #f3e7d3;
            background: #1f3142;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 1px solid #6d8db2;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            flex-shrink: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 45%;
        }
        .country-label:hover {
            background: #2c4056;
            border-color: #b4d0f0;
            transform: scale(1.02);
        }

        /* mobile-friendly dropdown overlay */
        .selector-container {
            position: relative;
            min-width: 200px;
            background: #1b2938;
            border-radius: 36px;
            padding: 0.3rem;
            border: 1px solid #4f6c8a;
            box-shadow: 0 6px 14px black;
            flex: 1;
            max-width: 280px;
        }

        @media (max-width: 680px) {
            .country-bar {
                padding: 0.5rem 0.8rem;
                gap: 0.5rem;
            }
            
            .country-label {
                font-size: 1rem;
                padding: 0.35rem 0.8rem;
                max-width: 40%;
            }
            
            .browse-toggle button {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
            
            .selector-container {
                position: fixed;
                top: 65px;
                left: 10px;
                right: 10px;
                width: auto;
                max-width: none;
                z-index: 1000;
                background: #0f1f2e;
                border: 2px solid #5f7ea0;
                border-radius: 28px;
                box-shadow: 0 20px 35px rgba(0,0,0,0.9);
                backdrop-filter: blur(12px);
                margin: 0;
            }
            
            #countrySelectInput {
                font-size: 1rem;
                padding: 0.7rem 1rem;
            }
            
            #countrySelect {
                max-height: 200px;
                font-size: 1rem;
            }
            
            #countrySelect option {
                padding: 10px 12px;
            }
            
            .selector-container {
                animation: fadeSlideDown 0.2s ease;
            }
            @keyframes fadeSlideDown {
                from {
                    opacity: 0;
                    transform: translateY(-12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            .stats {
                display: none;
            }
        }
        
        @media (max-width: 480px) {
            .country-bar {
                padding: 0.4rem 0.6rem;
            }
            
            .country-label {
                font-size: 0.85rem;
                padding: 0.3rem 0.7rem;
                max-width: 38%;
            }
            
            .browse-toggle button {
                padding: 4px 8px;
                font-size: 0.7rem;
            }
        }

        #countrySelectInput {
            width: 100%;
            padding: 0.7rem 1rem;
            font-size: 1rem;
            border-radius: 30px;
            border: none;
            background: #10212e;
            color: white;
            outline: 1px solid #3b5777;
            font-weight: 400;
        }
        #countrySelectInput:focus {
            outline: 2px solid #7fa3cc;
        }

        #countrySelect {
            width: 100%;
            margin-top: 8px;
            background: #0d1c2a;
            color: #e2eaf5;
            border: 1px solid #315072;
            border-radius: 24px;
            padding: 6px;
            font-size: 0.95rem;
            max-height: 260px;
        }
        
        #countrySelect option {
            padding: 8px 12px;
            border-radius: 16px;
            background: #112433;
            color: #f0f4fa;
        }

        .stats {
            margin-left: auto;
            display: flex;
            gap: 0.8rem;
            font-size: 0.8rem;
            background: #0e1d2c;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #c4dcf5;
            border: 1px solid #2e4b6b;
            white-space: nowrap;
        }
        
        @media (max-width: 560px) {
            .stats {
                display: none;
            }
        }

        /* toggle modern */
        .browse-toggle {
            background: #1f3142;
            border-radius: 40px;
            padding: 0.15rem;
            display: flex;
            gap: 0px;
            border: 1px solid #47688b;
            box-shadow: inset 0 1px 3px #00000055;
            flex-shrink: 0;
        }
        .browse-toggle button {
            background: transparent;
            border: none;
            color: #bed3ec;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .browse-toggle button.active-mode {
            background: #31658c;
            color: white;
            border-color: #b5d2ff;
            box-shadow: 0 2px 8px #00000077;
        }

        /* slider stage with smoother gradients */
        .slider-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 40%, #15222e, #040a12);
            padding: 0.5rem;
            position: relative;
            touch-action: pan-y pinch-zoom;
            min-height: 0;
        }

        .slider-viewport {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slider-image-frame {
            max-width: 100%;
            max-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 18, 28, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.8), 0 0 0 1px #3e5a78 inset;
            padding: 0.8rem;
            transition: background 0.2s;
        }

        .slider-image-frame img {
            max-width: 100%;
            max-height: calc(100vh - 280px);
            object-fit: contain;
            border-radius: 20px;
            transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            background: #172734;
            box-shadow: 0 8px 18px black;
            will-change: transform, opacity;
        }

        /* navigation arrows softer */
        .nav-arrow {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: rgba(240, 230, 200, 0.5);
            cursor: pointer;
            transition: 0.2s;
            z-index: 15;
            text-shadow: 0 2px 12px black;
            font-weight: 300;
        }

        .nav-arrow.left {
            left: 0;
            background: linear-gradient(to left, transparent, rgba(0,25,50,0.4));
        }
        .nav-arrow.right {
            right: 0;
            background: linear-gradient(to right, transparent, rgba(0,25,50,0.4));
        }

        .nav-arrow:hover {
            color: #fff2dd;
            background: rgba(20, 50, 85, 0.6);
            font-size: 4.5rem;
        }

        /* bottom panel refined */
        .info-panel {
            background: #101c2ad9;
            backdrop-filter: blur(8px);
            border-top: 1px solid #47648b;
            padding: 0.6rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem 1.2rem;
            font-size: 0.9rem;
            align-items: center;
            z-index: 18;
            box-shadow: 0 -8px 24px black;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #acc4e3;
            letter-spacing: 0.8px;
            font-weight: 500;
        }

        .info-value {
            font-weight: 500;
            color: #f7e9d4;
            font-size: 1rem;
            word-break: break-word;
            text-shadow: 0 1px 4px black;
        }

        .note-value {
            max-width: 300px;
            font-size: 0.9rem;
            color: #e0edff;
        }

        .counter {
            margin-left: auto;
            background: #1b3145;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #6f8fb2;
            font-weight: 500;
            box-shadow: 0 2px 8px black;
            white-space: nowrap;
        }

        /* thumbnail strip – more elegant */
        .thumbnail-strip {
            background: #0f1b28e0;
            backdrop-filter: blur(4px);
            border-top: 1px solid #3b577b;
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            overflow-y: hidden;
            align-items: center;
            white-space: nowrap;
            scrollbar-width: thin;
            scrollbar-color: #6a8bb8 #1d3143;
            z-index: 15;
        }
        .thumbnail-strip::-webkit-scrollbar {
            height: 5px;
        }
        .thumbnail-strip::-webkit-scrollbar-track {
            background: #1d3143;
            border-radius: 12px;
        }
        .thumbnail-strip::-webkit-scrollbar-thumb {
            background: #6a8bb8;
            border-radius: 12px;
        }

        .thumbnail {
            flex: 0 0 auto;
            width: 80px;
            height: 60px;
            background: #1f3343;
            border-radius: 14px;
            border: 2px solid transparent;
            overflow: hidden;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.7);
            will-change: transform;
        }
        .thumbnail:hover {
            border-color: #b4d2fa;
            transform: scale(1.05) translateY(-2px);
        }
        .thumbnail.active-thumb {
            border-color: #ffd966;
            box-shadow: 0 0 0 2px #c9a756, 0 6px 12px black;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #1a3142;
            pointer-events: none;
        }
        .no-thumb {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1f3343;
            color: #adc3dc;
            font-size: 0.7rem;
        }
        
        @media (max-width: 680px) {
            .thumbnail {
                width: 65px;
                height: 55px;
            }
            .info-panel {
                padding: 0.5rem 0.8rem;
                gap: 0.5rem 1rem;
            }
            .info-value {
                font-size: 0.85rem;
            }
            .note-value {
                font-size: 0.8rem;
                max-width: 150px;
            }
            .counter {
                font-size: 0.8rem;
                padding: 0.15rem 0.8rem;
            }
            .nav-arrow {
                width: 18%;
                font-size: 3rem;
            }
            .slider-image-frame img {
                max-height: calc(100vh - 300px);
            }
        }
        
        @media (max-width: 480px) {
            .thumbnail {
                width: 55px;
                height: 50px;
            }
            .info-value {
                font-size: 0.75rem;
            }
            .note-value {
                font-size: 0.7rem;
                max-width: 120px;
            }
        }
    </style>
</head>
<body>

<!-- top bar with country selector + browse mode toggle -->
<div class="country-bar" id="countryBar">
    <div id="countryDisplayLabel" class="country-label" tabindex="0">loading countries...</div>
    <div class="browse-toggle">
        <button id="modeCountry" class="active-mode">🇺🇳 Country</button>
        <button id="modeGlobal">🌍 All</button>
    </div>
    <div class="stats" id="stats"><span id="totalCountries">0</span> · <span id="totalItems">0</span></div>
</div>

<!-- selector container moved outside for better mobile handling -->
<div class="selector-container" id="selectorContainer" style="display: none;">
    <input type="text" id="countrySelectInput" placeholder="🔍 search country..." autocomplete="off">
    <select size="8" id="countrySelect"></select>
</div>

<!-- main slider area -->
<div class="slider-stage" id="sliderStage">
    <div class="nav-arrow left" id="prevArrow" aria-label="previous coin">‹</div>
    <div class="slider-viewport" id="sliderViewport">
        <div class="slider-image-frame" id="imageFrame"></div>
    </div>
    <div class="nav-arrow right" id="nextArrow" aria-label="next coin">›</div>
</div>

<!-- bottom info panel -->
<div class="info-panel" id="infoPanel">
    <div class="info-item"><span class="info-label">donor</span><span class="info-value" id="donorName">—</span></div>
    <div class="info-item"><span class="info-label">year</span><span class="info-value" id="coinYear">—</span></div>
    <div class="info-item"><span class="info-label">size</span><span class="info-value" id="coinSize">—</span></div>
    <div class="info-item" style="flex:2;"><span class="info-label">note</span><span class="info-value note-value" id="coinNote">—</span></div>
    <div class="counter" id="counter">0 / 0</div>
</div>

<!-- thumbnail strip (all images, uniform size) -->
<div class="thumbnail-strip" id="thumbnailStrip"></div>

<script>
    (function() {
        // ========== UTILITY: proper case for country names
        function toTitleCase(str) {
            if (!str) return '';
            return str.split(' ').map(word => {
                if (word.length === 0) return word;
                return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
            }).join(' ');
        }

        // ---------- GLOBALS ----------
        let allCoins = [];
        let countries = [];
        let currentCountry = null;
        let countryItems = [];
        let currentIndex = 0;
        let activeMode = 'country';
        let activeList = [];

        // UI elements
        const displayLabel = document.getElementById('countryDisplayLabel');
        const selectorContainer = document.getElementById('selectorContainer');
        const selectInput = document.getElementById('countrySelectInput');
        const selectEl = document.getElementById('countrySelect');
        const totalCountriesSpan = document.getElementById('totalCountries');
        const totalItemsSpan = document.getElementById('totalItems');
        const donorSpan = document.getElementById('donorName');
        const yearSpan = document.getElementById('coinYear');
        const sizeSpan = document.getElementById('coinSize');
        const noteSpan = document.getElementById('coinNote');
        const counterSpan = document.getElementById('counter');
        const imageFrame = document.getElementById('imageFrame');
        const prevArrow = document.getElementById('prevArrow');
        const nextArrow = document.getElementById('nextArrow');
        const sliderStage = document.getElementById('sliderStage');
        const thumbnailStrip = document.getElementById('thumbnailStrip');
        const modeCountryBtn = document.getElementById('modeCountry');
        const modeGlobalBtn = document.getElementById('modeGlobal');

        // touch vars
        let touchStartX = 0;
        let touchEndX = 0;
        const minSwipeDistance = 50;
        
        function closeSelector(applySelection = true) {
            if (selectorContainer.style.display !== 'block') return;
            if (applySelection) {
                const selectedOption = selectEl.options[selectEl.selectedIndex];
                if (selectedOption && selectedOption.value && activeMode === 'country') {
                    if (selectedOption.value !== currentCountry) {
                        switchCountry(selectedOption.value);
                    } else {
                        displayLabel.textContent = currentCountry;
                    }
                }
            }
            selectorContainer.style.display = 'none';
            displayLabel.style.display = 'inline-block';
            if (window.innerWidth <= 680) {
                document.body.style.overflow = '';
            }
        }
        
        function openSelector() {
            displayLabel.style.display = 'none';
            selectorContainer.style.display = 'block';
            selectInput.value = '';
            filterSelectOptions('');
            selectInput.focus();
            for (let i = 0; i < selectEl.options.length; i++) {
                if (selectEl.options[i].value === currentCountry) {
                    selectEl.selectedIndex = i;
                    break;
                }
            }
            if (window.innerWidth <= 680) {
                document.body.style.overflow = 'hidden';
            }
        }

        async function loadData() {
            try {
                const response = await fetch('images/coins.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                allCoins = await response.json();

                allCoins = allCoins.filter(c => c.country && c.country.trim() !== '' && c.image && c.image.trim() !== '');

                allCoins = allCoins.map(coin => ({
                    ...coin,
                    country: toTitleCase(coin.country.trim())
                }));

                const countrySet = new Set();
                allCoins.forEach(c => countrySet.add(c.country));
                countries = Array.from(countrySet).sort((a,b) => a.localeCompare(b));

                totalCountriesSpan.textContent = countries.length;
                totalItemsSpan.textContent = allCoins.length;

                if (countries.length === 0) throw new Error('no valid countries');

                currentCountry = countries[0];
                switchCountry(currentCountry);
                populateSelect(countries);
                setActiveMode('country');

            } catch (e) {
                console.error('load error:', e);
                displayLabel.textContent = '⚠️ error';
                imageFrame.innerHTML = `<div style="color:#ccc; padding:2rem;">failed to load coins.json<br>check console</div>`;
            }
        }

        function populateSelect(countryList) {
            selectEl.innerHTML = '';
            countryList.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                selectEl.appendChild(opt);
            });
        }

        function filterSelectOptions(filterText) {
            const term = filterText.trim().toLowerCase();
            const options = selectEl.options;
            let firstMatchIndex = -1;
            for (let i = 0; i < options.length; i++) {
                const opt = options[i];
                const matches = term === '' || opt.value.toLowerCase().includes(term);
                opt.style.display = matches ? '' : 'none';
                if (matches && firstMatchIndex === -1) firstMatchIndex = i;
            }
            if (firstMatchIndex !== -1) selectEl.selectedIndex = firstMatchIndex;
        }

        function switchCountry(countryName) {
            if (!countryName) return;
            currentCountry = countryName;
            countryItems = allCoins.filter(c => c.country === countryName);
            displayLabel.textContent = countryName;

            if (activeMode === 'country') {
                activeList = [...countryItems];
                currentIndex = countryItems.length > 0 ? 0 : -1;
                renderCurrentCoin();
                rebuildThumbnails();
            } else {
                rebuildThumbnails();
            }
        }

        function setActiveMode(mode) {
            activeMode = mode;
            if (mode === 'country') {
                modeCountryBtn.classList.add('active-mode');
                modeGlobalBtn.classList.remove('active-mode');
                activeList = [...countryItems];
                if (activeList.length === 0) currentIndex = -1;
                else if (currentIndex >= activeList.length) currentIndex = activeList.length - 1;
                else if (currentIndex < 0 && activeList.length > 0) currentIndex = 0;
            } else {
                modeGlobalBtn.classList.add('active-mode');
                modeCountryBtn.classList.remove('active-mode');
                activeList = [...allCoins];
                if (currentIndex >= allCoins.length) currentIndex = allCoins.length-1;
                if (currentIndex < 0 && allCoins.length>0) currentIndex = 0;
                if (activeList.length === 0) currentIndex = -1;
            }
            renderCurrentCoin();
            rebuildThumbnails();
        }

        function renderCurrentCoin() {
            if (!activeList || activeList.length === 0 || currentIndex < 0 || currentIndex >= activeList.length) {
                imageFrame.innerHTML = `<div style="color:#aaa; padding:2rem; text-align:center;">🪙 no coins</div>`;
                donorSpan.textContent = '—';
                yearSpan.textContent = '—';
                sizeSpan.textContent = '—';
                noteSpan.textContent = '—';
                counterSpan.textContent = `0 / 0`;
                return;
            }

            const coin = activeList[currentIndex];
            const countryFolder = encodeURIComponent(coin.country);
            const imageFile = encodeURIComponent(coin.image);
            const imagePath = `images/${countryFolder}/${imageFile}`;

            const img = new Image();
            img.onload = () => {
                imageFrame.innerHTML = '';
                img.style.opacity = '1';
                imageFrame.appendChild(img);
            };
            img.onerror = () => {
                imageFrame.innerHTML = `<div style="color:#aaa; padding:1rem;">🖼️ missing<br>${coin.image}</div>`;
            };
            img.src = imagePath;
            img.alt = `${coin.country} ${coin.note || ''}`;
            img.style.opacity = '0';
            img.style.transition = 'opacity 0.25s';
            
            if (img.complete && img.naturalWidth > 0) {
                img.style.opacity = '1';
                imageFrame.innerHTML = '';
                imageFrame.appendChild(img);
            } else {
                img.onload = (e) => {
                    e.target.style.opacity = '1';
                    imageFrame.innerHTML = '';
                    imageFrame.appendChild(img);
                };
            }

            donorSpan.textContent = coin.donor_name || '—';
            yearSpan.textContent = coin.year && coin.year !== '0000' ? coin.year : '—';
            sizeSpan.textContent = coin.size && coin.size !== '00' ? coin.size : '—';
            let note = coin.note || '—';
            if (note.length > 85) note = note.substring(0,82)+'…';
            noteSpan.textContent = note;
            counterSpan.textContent = `${currentIndex+1} / ${activeList.length}`;

            document.querySelectorAll('.thumbnail').forEach((thumb, idx) => {
                thumb.classList.toggle('active-thumb', idx === currentIndex);
            });

            const activeThumb = document.querySelector('.thumbnail.active-thumb');
            if (activeThumb) {
                activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function rebuildThumbnails() {
            thumbnailStrip.innerHTML = '';
            if (!activeList || activeList.length === 0) {
                thumbnailStrip.innerHTML = '<div class="no-thumb" style="width:100%; text-align:center;">✨ no items</div>';
                return;
            }

            activeList.forEach((coin, idx) => {
                const thumbDiv = document.createElement('div');
                thumbDiv.className = 'thumbnail';
                if (idx === currentIndex) thumbDiv.classList.add('active-thumb');

                const countryFolder = encodeURIComponent(coin.country);
                const imageFile = encodeURIComponent(coin.image);
                const imgPath = `images/${countryFolder}/${imageFile}`;

                const img = document.createElement('img');
                img.src = imgPath;
                img.alt = coin.country;
                img.onerror = () => {
                    thumbDiv.innerHTML = '<span class="no-thumb">📀</span>';
                };
                thumbDiv.appendChild(img);

                thumbDiv.addEventListener('click', (function(capturedIdx) {
                    return function(ev) {
                        ev.stopPropagation();
                        currentIndex = capturedIdx;
                        renderCurrentCoin();
                    };
                })(idx));

                thumbnailStrip.appendChild(thumbDiv);
            });
        }

        function nextImage() {
            if (!activeList.length) return;
            currentIndex = (currentIndex + 1) % activeList.length;
            renderCurrentCoin();
        }
        
        function prevImage() {
            if (!activeList.length) return;
            currentIndex = (currentIndex - 1 + activeList.length) % activeList.length;
            renderCurrentCoin();
        }

        // Event Listeners
        displayLabel.addEventListener('click', (e) => {
            e.stopPropagation();
            openSelector();
        });

        function commitCountrySelectionAndClose() {
            if (selectorContainer.style.display !== 'block') return;
            const selectedOption = selectEl.options[selectEl.selectedIndex];
            if (selectedOption && selectedOption.value && activeMode === 'country') {
                if (selectedOption.value !== currentCountry) {
                    switchCountry(selectedOption.value);
                } else {
                    displayLabel.textContent = currentCountry;
                }
            }
            selectorContainer.style.display = 'none';
            displayLabel.style.display = 'inline-block';
            if (window.innerWidth <= 680) document.body.style.overflow = '';
        }

        selectInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                commitCountrySelectionAndClose();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                selectorContainer.style.display = 'none';
                displayLabel.style.display = 'inline-block';
                if (window.innerWidth <= 680) document.body.style.overflow = '';
            }
        });

        selectInput.addEventListener('input', (e) => filterSelectOptions(e.target.value));
        
        selectEl.addEventListener('change', () => {
            if (selectorContainer.style.display === 'block') {
                commitCountrySelectionAndClose();
            }
        });
        
        document.addEventListener('click', function(e) {
            if (selectorContainer.style.display !== 'block') return;
            if (!selectorContainer.contains(e.target) && e.target !== displayLabel) {
                commitCountrySelectionAndClose();
            }
        });
        
        selectInput.addEventListener('touchstart', (e) => e.stopPropagation());

        modeCountryBtn.addEventListener('click', () => {
            if (activeMode === 'country') return;
            setActiveMode('country');
        });
        
        modeGlobalBtn.addEventListener('click', () => {
            if (activeMode === 'global') return;
            setActiveMode('global');
        });

        prevArrow.addEventListener('click', prevImage);
        nextArrow.addEventListener('click', nextImage);

        sliderStage.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});
        
        sliderStage.addEventListener('touchend', (e) => {
            if (touchStartX === 0) return;
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > minSwipeDistance) {
                diff > 0 ? prevImage() : nextImage();
            }
            touchStartX = 0;
        }, {passive: true});

        window.addEventListener('keydown', (e) => {
            if (selectorContainer.style.display === 'block') return;
            if (e.key === 'ArrowLeft') { e.preventDefault(); prevImage(); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); nextImage(); }
        });

        loadData();
    })();
</script>
</body>
</html>
