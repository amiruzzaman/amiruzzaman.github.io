<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>coin gallery · fullpage slider</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #111;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #eee;
            overflow: hidden;
        }

        /* top bar: country selector */
        .country-bar {
            background: #1f2a3a;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            border-bottom: 2px solid #3e5368;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .country-label {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #f5e7c8;
            background: #2e3d4e;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #6d8aab;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            white-space: nowrap;
        }
        .country-label:hover {
            background: #3d4f63;
            border-color: #aac7f0;
        }

        .selector-container {
            position: relative;
            min-width: 260px;
        }

        #countrySelect {
            width: 100%;
            padding: 0.7rem 1rem;
            font-size: 1.3rem;
            border-radius: 30px;
            border: 1px solid #a0b9d6;
            background: #1e2b36;
            color: white;
            outline: none;
            box-shadow: 0 4px 12px black;
        }

        #countrySelect option {
            background: #1e2b36;
            color: #eee;
        }

        .hidden-input {
            display: none;
        }

        .stats {
            margin-left: auto;
            display: flex;
            gap: 2rem;
            font-size: 1rem;
            background: #0f1a24;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            color: #c0d3ec;
        }

        /* main slider area */
        .slider-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b1219;
            padding: 0.5rem;
            position: relative;
            touch-action: pan-y pinch-zoom; /* allow horizontal touch sliders */
        }

        .slider-viewport {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            user-select: none;
        }

        .slider-image-frame {
            max-width: 100%;
            max-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b1117;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            padding: 1rem;
        }

        .slider-image-frame img {
            max-width: 100%;
            max-height: calc(100vh - 230px);   /* almost full page minus info panel */
            object-fit: contain;
            border-radius: 16px;
            transition: opacity 0.25s;
            background: #1e2a33;
            box-shadow: 0 0 0 1px #3f5568;
        }

        /* navigation arrows (large click zones) */
        .nav-arrow {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 18%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: rgba(255, 240, 200, 0.5);
            cursor: pointer;
            transition: 0.2s;
            z-index: 15;
            text-shadow: 0 2px 8px black;
            background: linear-gradient(to right, transparent 50%, rgba(0,0,0,0.2) 90%);
        }

        .nav-arrow.left {
            left: 0;
            background: linear-gradient(to left, transparent, rgba(0,20,40,0.4));
        }
        .nav-arrow.right {
            right: 0;
            background: linear-gradient(to right, transparent, rgba(0,20,40,0.4));
        }

        .nav-arrow:hover {
            color: #ffeedd;
            background: rgba(20, 40, 70, 0.5);
        }

        /* bottom info panel */
        .info-panel {
            background: #18222e;
            border-top: 2px solid #3f556b;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem 3rem;
            font-size: 1.2rem;
            align-items: center;
            z-index: 18;
            box-shadow: 0 -6px 20px black;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #9bb5d4;
            letter-spacing: 0.8px;
        }

        .info-value {
            font-weight: 500;
            color: #f2e0c0;
            font-size: 1.3rem;
            word-break: break-word;
        }

        .note-value {
            max-width: 400px;
            font-size: 1.2rem;
            color: #d6e2f5;
        }

        .counter {
            margin-left: auto;
            background: #2e3e52;
            padding: 0.5rem 1.4rem;
            border-radius: 36px;
            font-size: 1.3rem;
            border: 1px solid #617a9b;
        }

        /* mobile adjustments */
        @media (max-width: 700px) {
            .country-bar { padding: 0.4rem 1rem; }
            .country-label { font-size: 1.3rem; }
            .stats { display: none; }
            .info-panel { padding: 0.8rem; gap: 1rem; }
            .info-value { font-size: 1rem; }
            .nav-arrow { width: 15%; font-size: 3.5rem; }
        }

        /* no image fallback */
        .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1f2937;
            color: #bbccdd;
            width: 480px;
            height: 320px;
            border-radius: 48px;
            font-size: 1.5rem;
            border: 3px dashed #607080;
        }
    </style>
</head>
<body>

<!-- top bar with dynamic country label / selector -->
<div class="country-bar" id="countryBar">
    <div id="countryDisplayLabel" class="country-label" tabindex="0">loading countries...</div>
    <div class="selector-container" id="selectorContainer" style="display: none;">
        <input type="text" id="countrySelectInput" placeholder="type to filter..." autocomplete="off">
        <select size="8" id="countrySelect"></select>
    </div>
    <div class="stats" id="stats"><span id="totalCountries">0</span> countries · <span id="totalItems">0</span> items</div>
</div>

<!-- main slider area -->
<div class="slider-stage" id="sliderStage">
    <!-- left arrow (prev) -->
    <div class="nav-arrow left" id="prevArrow" aria-label="previous coin">‹</div>

    <div class="slider-viewport" id="sliderViewport">
        <div class="slider-image-frame" id="imageFrame">
            <!-- image will be injected here -->
        </div>
    </div>

    <!-- right arrow (next) -->
    <div class="nav-arrow right" id="nextArrow" aria-label="next coin">›</div>
</div>

<!-- bottom info panel -->
<div class="info-panel" id="infoPanel">
    <div class="info-item"><span class="info-label">donor</span><span class="info-value" id="donorName">—</span></div>
    <div class="info-item"><span class="info-label">year</span><span class="info-value" id="coinYear">—</span></div>
    <div class="info-item"><span class="info-label">size</span><span class="info-value" id="coinSize">—</span></div>
    <div class="info-item" style="flex:2;"><span class="info-label">note</span><span class="info-value note-value" id="coinNote">—</span></div>
    <div class="counter" id="counter">0 / 0</div>
</div>

<script>
    (function() {
        // ---------- GLOBALS ----------
        let allCoins = [];                 // raw data from JSON
        let countries = [];                // unique country names
        let currentCountry = null;          // selected country
        let countryItems = [];              // coins belonging to currentCountry
        let currentIndex = 0;                // index within countryItems

        // UI elements
        const displayLabel = document.getElementById('countryDisplayLabel');
        const selectorContainer = document.getElementById('selectorContainer');
        const selectInput = document.getElementById('countrySelectInput');
        const selectEl = document.getElementById('countrySelect');
        const totalCountriesSpan = document.getElementById('totalCountries');
        const totalItemsSpan = document.getElementById('totalItems');
        const donorSpan = document.getElementById('donorName');
        const yearSpan = document.getElementById('coinYear');
        const sizeSpan = document.getElementById('coinSize');
        const noteSpan = document.getElementById('coinNote');
        const counterSpan = document.getElementById('counter');
        const imageFrame = document.getElementById('imageFrame');
        const prevArrow = document.getElementById('prevArrow');
        const nextArrow = document.getElementById('nextArrow');
        const sliderStage = document.getElementById('sliderStage');

        // touch start X for swipe
        let touchStartX = 0;
        let touchEndX = 0;
        const minSwipeDistance = 50;

        // ---------- LOAD JSON ----------
        async function loadData() {
            try {
                // coins.json is located in images/coins.json (as per spec)
                const response = await fetch('images/coins.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                allCoins = await response.json();

                // filter out entries without image or country (but keep all, just filter empty images later)
                allCoins = allCoins.filter(c => c.country && c.country.trim() !== '' && c.image && c.image.trim() !== '');

                // extract unique country list (trim and sort)
                const countrySet = new Set();
                allCoins.forEach(c => countrySet.add(c.country.trim()));
                countries = Array.from(countrySet).sort((a,b) => a.localeCompare(b));

                totalCountriesSpan.textContent = countries.length;
                totalItemsSpan.textContent = allCoins.length;

                if (countries.length === 0) throw new Error('no valid countries');
                // set first country as default
                switchCountry(countries[0]);

                // populate select dropdown with all countries
                populateSelect(countries);

            } catch (e) {
                console.error('load error:', e);
                displayLabel.textContent = '⚠️ error loading';
                imageFrame.innerHTML = `<div class="no-image">failed to load coins.json<br>check console</div>`;
            }
        }

        function populateSelect(countryList) {
            selectEl.innerHTML = '';
            countryList.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                selectEl.appendChild(opt);
            });
        }

        // filter select options based on input text (partial match, case-insensitive)
        function filterSelectOptions(filterText) {
            const term = filterText.trim().toLowerCase();
            const options = selectEl.options;
            let firstMatchIndex = -1;
            for (let i = 0; i < options.length; i++) {
                const opt = options[i];
                const matches = term === '' || opt.value.toLowerCase().includes(term);
                opt.style.display = matches ? '' : 'none';
                if (matches && firstMatchIndex === -1) firstMatchIndex = i;
            }
            if (firstMatchIndex !== -1) selectEl.selectedIndex = firstMatchIndex;
        }

        // switch to a given country (by name)
        function switchCountry(countryName) {
            if (!countryName) return;
            currentCountry = countryName;
            countryItems = allCoins.filter(c => c.country.trim() === countryName);
            currentIndex = (countryItems.length > 0) ? 0 : -1;

            // update label
            displayLabel.textContent = countryName;

            // hide selector, show label
            selectorContainer.style.display = 'none';
            displayLabel.style.display = 'inline-block';

            // refresh image & info
            renderCurrentCoin();
        }

        // render current coin based on countryItems[currentIndex]
        function renderCurrentCoin() {
            if (!currentCountry || countryItems.length === 0 || currentIndex < 0) {
                // show empty / placeholder
                imageFrame.innerHTML = `<div class="no-image">🪙 no coins for this country</div>`;
                donorSpan.textContent = '—';
                yearSpan.textContent = '—';
                sizeSpan.textContent = '—';
                noteSpan.textContent = '—';
                counterSpan.textContent = `0 / 0`;
                return;
            }

            const coin = countryItems[currentIndex];
            // build image path: images/{country name}/{image file}
            // encode country and filename to be safe (spaces etc)
            const countryFolder = encodeURIComponent(coin.country.trim());
            const imageFile = encodeURIComponent(coin.image);
            const imagePath = `images/${countryFolder}/${imageFile}`;

            // create image element
            const img = new Image();
            img.onload = () => {
                // clear and append
                imageFrame.innerHTML = '';
                imageFrame.appendChild(img);
            };
            img.onerror = (e) => {
                console.warn('image not found:', imagePath);
                imageFrame.innerHTML = `<div class="no-image">🖼️ image missing<br>${coin.image}</div>`;
            };
            img.src = imagePath;
            img.alt = `${coin.country} ${coin.note || 'coin'}`;

            // update info fields
            donorSpan.textContent = coin.donor_name || '—';
            yearSpan.textContent = coin.year && coin.year !== '0000' ? coin.year : '—';
            sizeSpan.textContent = coin.size && coin.size !== '00' ? coin.size : '—';
            let note = coin.note || '—';
            if (note.length > 80) note = note.substring(0,80)+'…';
            noteSpan.textContent = note;
            counterSpan.textContent = `${currentIndex+1} / ${countryItems.length}`;
        }

        // navigation
        function nextImage() {
            if (countryItems.length === 0) return;
            currentIndex = (currentIndex + 1) % countryItems.length;
            renderCurrentCoin();
        }

        function prevImage() {
            if (countryItems.length === 0) return;
            currentIndex = (currentIndex - 1 + countryItems.length) % countryItems.length;
            renderCurrentCoin();
        }

        // ----- UI: country label click / blur interaction -----
        displayLabel.addEventListener('click', (e) => {
            // hide label, show selector with input+select
            displayLabel.style.display = 'none';
            selectorContainer.style.display = 'block';
            selectInput.value = '';           // clear filter
            filterSelectOptions('');            // show all options
            selectInput.focus();
            // preselect current country in dropdown
            for (let i = 0; i < selectEl.options.length; i++) {
                if (selectEl.options[i].value === currentCountry) {
                    selectEl.selectedIndex = i;
                    break;
                }
            }
        });

        // function to commit selection and return to label
        function commitCountrySelection() {
            const selectedOption = selectEl.options[selectEl.selectedIndex];
            if (selectedOption && selectedOption.value) {
                switchCountry(selectedOption.value);
            } else {
                // fallback: revert to label, no change
                displayLabel.style.display = 'inline-block';
                selectorContainer.style.display = 'none';
            }
        }

        // when input loses focus -> commit if click outside, but careful with select clicks
        selectInput.addEventListener('blur', (e) => {
            // if the related target is inside selectorContainer (like select), ignore temporary
            setTimeout(() => {
                if (!selectorContainer.contains(document.activeElement)) {
                    // if focus moved outside completely, commit & close
                    commitCountrySelection();
                }
            }, 120);
        });

        // on 'Enter' in input, commit
        selectInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                commitCountrySelection();
            } else if (e.key === 'Escape') {
                // cancel: go back to label without changing
                displayLabel.style.display = 'inline-block';
                selectorContainer.style.display = 'none';
            }
        });

        // filter as user types
        selectInput.addEventListener('input', (e) => {
            filterSelectOptions(e.target.value);
        });

        // select change -> optional (we could commit immediately, but better to wait for blur/enter)
        // we can commit on change as well for convenience (but may confuse)
        selectEl.addEventListener('change', (e) => {
            // immediately commit on select (click or arrow+enter)
            commitCountrySelection();
        });

        // to catch clicks on select (so they don't trigger blur wrongly)
        selectEl.addEventListener('mousedown', (e) => {
            // prevent immediate blur stealing? not necessary but safe
        });

        // also when label is focused and blurred? we keep it simple

        // ---------- ARROWS ----------
        prevArrow.addEventListener('click', prevImage);
        nextArrow.addEventListener('click', nextImage);

        // ---------- TOUCH SWIPE ----------
        sliderStage.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        sliderStage.addEventListener('touchend', (e) => {
            if (touchStartX === 0) return;
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > minSwipeDistance) {
                if (diff > 0) {
                    prevImage();   // swipe right -> prev
                } else {
                    nextImage();   // swipe left -> next
                }
            }
            // reset
            touchStartX = 0;
        }, {passive: true});

        // keyboard left/right arrows
        window.addEventListener('keydown', (e) => {
            // if the selector is open, we ignore arrow keys (so typing in input works)
            if (selectorContainer.style.display === 'block') return;
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevImage();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextImage();
            }
        });

        // load data
        loadData();

        // minor: when user clicks away from selector (document click) but we handled via blur
        document.addEventListener('click', function(e) {
            if (selectorContainer.style.display !== 'block') return;
            // if click outside container, commit (but blur will handle usually)
            if (!selectorContainer.contains(e.target) && e.target !== displayLabel) {
                commitCountrySelection();
            }
        });

        // handle edge: if no image but we need to show
    })();
</script>
</body>
</html>
