<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Country Info Finder</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #e67e22; /* Warm orange to reflect proxy solution */
            --background-color: #f8f9fa;
            --card-background: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--secondary-color);
        }

        button {
            padding: 12px 24px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #d35400;
        }

        .error-message {
            color: #e74c3c;
            background: #fde8e7;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        #result {
            display: none;
        }

        .loader {
            display: none;
            text-align: center;
            font-size: 18px;
            color: var(--secondary-color);
            margin: 20px 0;
        }

        pre {
            background-color: #272822;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 14px;
            max-height: 400px;
            border-left: 5px solid var(--secondary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Country Info (CORS-Proxy Mode)</h1>
    
    <div class="search-box">
        <input type="text" id="countryInput" placeholder="Enter country name (e.g., Canada)...">
        <button id="searchBtn">Search</button>
    </div>

    <div class="loader" id="loader">Fetching records via safe proxy...</div>
    <div class="error-message" id="errorMessage"></div>

    <div id="result">
        <h3>API Response Data:</h3>
        <pre><code id="jsonOutput"></code></pre>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const countryInput = document.getElementById('countryInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultDiv = document.getElementById('result');
        const jsonOutput = document.getElementById('jsonOutput');
        const loader = document.getElementById('loader');
        const errorMessage = document.getElementById('errorMessage');

        function fetchCountryData(countryName) {
            // Default fallback to canada
            const queryName = countryName.trim() || 'canada';
            
            loader.style.display = 'block';
            resultDiv.style.display = 'none';
            errorMessage.style.display = 'none';

            // Target API endpoint
            const targetUrl = `https://www.apicountries.com/countries/name/${encodeURIComponent(queryName)}`;
            
            // Prepend corsproxy.io to dynamically strip away CORS blockers on localhost
            const proxyApiUrl = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;

            fetch(proxyApiUrl)
            .then(function (response) { 
                if (!response.ok) {
                    throw new Error(`Country "${queryName}" not found or proxy error.`);
                }
                return response.json(); 
            })
            .then(function (data) { 
                loader.style.display = 'none';
                jsonOutput.textContent = JSON.stringify(data, null, 2);
                resultDiv.style.display = 'block';
            })
            .catch(function (error) {
                loader.style.display = 'none';
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                console.error('Fetch Error Detail:', error);
            });
        }

        searchBtn.addEventListener('click', function() {
            fetchCountryData(countryInput.value);
        });

        countryInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchCountryData(countryInput.value);
            }
        });

        // Fire initial load for Canada
        fetchCountryData('');
    });
</script>

</body>
</html>
